<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileTransformer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#fff;color:#222;min-height:100vh;display:flex;justify-content:center;padding:16px;-webkit-tap-highlight-color:transparent}
.container{width:100%;max-width:480px;display:flex;flex-direction:column;gap:16px}
header{text-align:center;padding:16px 0 4px}
header h1{font-size:1.5rem;color:#222;font-weight:700;letter-spacing:.5px}
header .sub{font-size:.85rem;color:#999;margin-top:4px}

/* Tabs */
.tabs{display:flex;gap:0;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden}
.tab{flex:1;padding:10px;text-align:center;font-size:.9rem;font-weight:500;cursor:pointer;background:#fff;color:#888;border:none;transition:all .15s}
.tab.active{background:#222;color:#fff}
.tab+.tab{border-left:1px solid #e0e0e0}

/* Panels */
.panel{display:none;flex-direction:column;gap:14px}
.panel.active{display:flex}

/* Drop zone */
.drop-zone{border:2px dashed #ccc;border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#fff}
.drop-zone:hover,.drop-zone.drag-over{border-color:#555;background:#fafafa}
.drop-zone .icon{font-size:2.6rem;margin-bottom:10px;opacity:.7}
.drop-zone .label{font-size:1rem;color:#333;margin-bottom:4px;font-weight:500}
.drop-zone .hint{font-size:.8rem;color:#aaa}

/* Card item */
.card-item{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:12px 14px;border:1px solid #e0e0e0}
.card-item .fname{flex:1;font-size:.9rem;word-break:break-all;color:#222}
.card-item .fsize{font-size:.8rem;color:#999;white-space:nowrap}
.card-item .btn-sm{background:#fff;border:1px solid #e0e0e0;color:#888;font-size:.85rem;cursor:pointer;padding:4px 12px;border-radius:6px;transition:all .15s;white-space:nowrap;text-decoration:none}
.card-item .btn-sm:hover{border-color:#555;color:#333}
.card-item .btn-sm.danger{color:#c62828;border-color:#f5c6cb}
.card-item .btn-sm.danger:hover{background:#fff5f5}

/* Upload button */
.upload-btn{display:none;width:100%;padding:14px;background:#fff;color:#222;border:1.5px solid #555;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.upload-btn.show{display:block}
.upload-btn:hover{background:#f5f5f5;border-color:#333}
.upload-btn:disabled{background:#f5f5f5;border-color:#ddd;color:#bbb;cursor:not-allowed}

/* Progress */
.progress-item{background:#fff;border-radius:12px;padding:12px 14px;border:1px solid #e0e0e0}
.progress-item .pname{font-size:.85rem;margin-bottom:6px;display:flex;justify-content:space-between}
.progress-item .pname .status{font-size:.8rem;color:#999}
.progress-bar{height:5px;background:#eee;border-radius:3px;overflow:hidden}
.progress-bar .fill{height:100%;background:#555;border-radius:3px;width:0%;transition:width .2s}
.progress-item.done .progress-bar .fill{background:#333}
.progress-item.err .progress-bar .fill{background:#c62828}
.progress-item.err .pname .status{color:#c62828}

/* Summary */
.summary{display:none;padding:14px;border-radius:12px;text-align:center;font-size:.9rem}
.summary.ok{display:block;background:#f5f5f5;color:#222;border:1px solid #e0e0e0}
.summary.mix{display:block;background:#fff;color:#555;border:1px solid #e0e0e0}
.summary.fail{display:block;background:#fff;color:#c62828;border:1px solid #f5c6cb}

/* Clipboard */
.cb-area{width:100%;min-height:80px;padding:12px;border:1px solid #e0e0e0;border-radius:10px;font-size:.9rem;color:#222;resize:vertical;font-family:inherit}
.cb-area::placeholder{color:#ccc}
.cb-btn{width:100%;padding:12px;background:#fff;color:#222;border:1.5px solid #555;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.cb-btn:hover{background:#f5f5f5}
.cb-received{padding:12px;background:#fafafa;border-radius:10px;border:1px solid #e0e0e0;font-size:.9rem;color:#555;word-break:break-all;min-height:40px}
.cb-received .label{font-size:.75rem;color:#aaa;margin-bottom:4px}

/* Empty state */
.empty{text-align:center;color:#bbb;font-size:.85rem;padding:20px}
</style>
</head>
<body>
<div class="container">
<header><h1>FileTransformer</h1><div class="sub">LAN File Transfer</div></header>

<!-- Tabs -->
<div class="tabs">
<button class="tab active" data-tab="upload">📤 Upload</button>
<button class="tab" data-tab="download">📥 Download</button>
<button class="tab" data-tab="clipboard">📋 Clipboard</button>
</div>

<!-- Upload Panel -->
<div class="panel active" id="panel-upload">
<div class="drop-zone" id="dropZone"><div class="icon">📁</div><div class="label">Drop files here</div><div class="hint">or tap to browse</div></div>
<input type="file" id="fileInput" multiple hidden>
<div id="fileList"></div>
<button class="upload-btn" id="uploadBtn">Upload Files</button>
<div id="progressSection"></div>
<div class="summary" id="summary"></div>
</div>

<!-- Download Panel -->
<div class="panel" id="panel-download">
<div id="downloadList"><div class="empty">Loading…</div></div>
</div>

<!-- Clipboard Panel -->
<div class="panel" id="panel-clipboard">
<textarea class="cb-area" id="cbInput" placeholder="Type text to send to phone clipboard…"></textarea>
<button class="cb-btn" id="cbSend">Send to Phone</button>
<div class="cb-received" id="cbReceived"><div class="label">From phone:</div><span style="color:#ccc">Waiting…</span></div>
</div>
</div>

<script>
// ── Tabs ──
document.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});
  document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('active')});
  t.classList.add('active');document.getElementById('panel-'+t.dataset.tab).classList.add('active');
  if(t.dataset.tab==='download')loadDownloadList();
})});

// ── Upload ──
var files=[],dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),
    fileList=document.getElementById('fileList'),uploadBtn=document.getElementById('uploadBtn'),
    ps=document.getElementById('progressSection'),summary=document.getElementById('summary');
dropZone.addEventListener('click',function(){fileInput.click()});
dropZone.addEventListener('dragover',function(e){e.preventDefault();dropZone.classList.add('drag-over')});
dropZone.addEventListener('dragleave',function(){dropZone.classList.remove('drag-over')});
dropZone.addEventListener('drop',function(e){e.preventDefault();dropZone.classList.remove('drag-over');addFiles(e.dataTransfer.files)});
fileInput.addEventListener('change',function(){addFiles(fileInput.files);fileInput.value=''});
function addFiles(fl){for(var i=0;i<fl.length;i++)files.push(fl[i]);renderFiles()}
function removeFile(i){files.splice(i,1);renderFiles()}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';if(b<1073741824)return (b/1048576).toFixed(1)+' MB';return (b/1073741824).toFixed(1)+' GB'}
function renderFiles(){
  fileList.innerHTML=files.map(function(f,i){return '<div class="card-item"><span class="fname">'+esc(f.name)+'</span><span class="fsize">'+fmtSize(f.size)+'</span><button class="btn-sm danger" data-idx="'+i+'">&times;</button></div>'}).join('');
  fileList.querySelectorAll('.btn-sm').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();removeFile(parseInt(b.dataset.idx))})});
  uploadBtn.classList.toggle('show',files.length>0);uploadBtn.textContent='Upload Files ('+files.length+')';
}
uploadBtn.addEventListener('click',function(){uploadFiles()});
function uploadFiles(){
  uploadBtn.disabled=true;ps.innerHTML='';summary.className='summary';summary.textContent='';
  var ok=0,fail=0,tasks=files.map(function(file){return function(){var d=createProg(file.name);ps.appendChild(d);return upOne(file,d).then(function(){ok++},function(){fail++;d.querySelector('.status').textContent='Error';d.classList.add('err')})}});
  runSeq(tasks,function(){
    if(fail===0){summary.textContent='All '+ok+' file(s) uploaded successfully';summary.className='summary ok'}
    else if(ok>0){summary.textContent=ok+' succeeded, '+fail+' failed';summary.className='summary mix'}
    else{summary.textContent='Upload failed for all '+fail+' file(s)';summary.className='summary fail'}
    uploadBtn.disabled=false;
  });
}
function runSeq(t,d){var i=0;function n(){if(i>=t.length){d();return}t[i]().then(n,n);i++}n()}
function createProg(n){var d=document.createElement('div');d.className='progress-item';d.innerHTML='<div class="pname"><span>'+esc(n)+'</span><span class="status">0%</span></div><div class="progress-bar"><div class="fill" style="width:0%"></div></div>';return d}
function upOne(file,d){return new Promise(function(resolve,reject){var x=new XMLHttpRequest(),f=new FormData();f.append('file',file,file.name);x.upload.addEventListener('progress',function(e){if(e.lengthComputable){var p=Math.round(e.loaded/e.total*100);d.querySelector('.fill').style.width=p+'%';d.querySelector('.status').textContent=p+'%'}});x.addEventListener('load',function(){if(x.status===200){d.querySelector('.status').textContent='Done';d.classList.add('done');resolve()}else reject(new Error('HTTP '+x.status))});x.addEventListener('error',function(){reject(new Error('Network error'))});x.open('POST','/upload');x.setRequestHeader('X-Original-Filename',encodeURIComponent(file.name));x.send(f)})}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ── Download ──
var dlPollTimer=null;
function loadDownloadList(){
  var x=new XMLHttpRequest();
  x.addEventListener('load',function(){
    var dl=document.getElementById('downloadList');
    if(x.status!==200){dl.innerHTML='<div class="empty">Failed to load</div>';return}
    try{var files=JSON.parse(x.responseText)}catch(e){dl.innerHTML='<div class="empty">Parse error</div>';return}
    if(!files.length){dl.innerHTML='<div class="empty">No files shared from phone yet</div>';return}
    dl.innerHTML=files.map(function(f){return '<div class="card-item"><span class="fname">'+esc(f.name)+'</span><span class="fsize">'+fmtSize(f.size)+'</span><a class="btn-sm" href="/download/'+encodeURIComponent(f.name)+'" download>Download</a></div>'}).join('');
  });
  x.addEventListener('error',function(){document.getElementById('downloadList').innerHTML='<div class="empty">Failed to load</div>'});
  x.open('GET','/files');x.send();
}
function startDlPoll(){if(!dlPollTimer){dlPollTimer=setInterval(function(){if(document.getElementById('panel-download').classList.contains('active'))loadDownloadList()},3000)}}
startDlPoll();

// ── Clipboard ──
var cbPollTimer=null,lastCbText='';
document.getElementById('cbSend').addEventListener('click',function(){
  var text=document.getElementById('cbInput').value.trim();
  if(!text)return;
  var x=new XMLHttpRequest(),f=new FormData();f.append('text',text);
  x.addEventListener('load',function(){if(x.status===200){document.getElementById('cbInput').value='';alert('Sent')}});
  x.open('POST','/clipboard');x.send(f);
});
function pollClipboard(){
  var x=new XMLHttpRequest();
  x.addEventListener('load',function(){
    if(x.status!==200)return;
    try{var r=JSON.parse(x.responseText)}catch(e){return}
    if(r.text&&r.text!==lastCbText){lastCbText=r.text;document.getElementById('cbReceived').innerHTML='<div class="label">From phone:</div>'+esc(r.text)}
  });
  x.open('GET','/clipboard');x.send();
}
function startCbPoll(){if(!cbPollTimer){cbPollTimer=setInterval(function(){pollClipboard()},2000)}}
startCbPoll();
pollClipboard();
</script>
</body>
</html>
